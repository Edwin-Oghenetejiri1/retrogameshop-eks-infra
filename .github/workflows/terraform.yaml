name: IaC Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'envs/prod/**'
      - '.github/workflows/terraform.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'envs/prod/**'

env:
  AWS_ACCOUNT_ID:     ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_ROLE_NAME:      ${{ secrets.AWS_ROLE_NAME }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
  BUCKET_TF_STATE:    ${{ secrets.BUCKET_TF_STATE }}
  DYNAMO_DB_LOCK:     ${{ secrets.DYNAMO_DB_LOCK }}
  TF_DESTROY:         false
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infrastructure:
    name: Deploy EKS Infrastructure
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./envs/prod/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Terraform security scan
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          soft_fail: true
          working_directory: ./envs/prod/

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}
          role-session-name: GitHubActionsSession
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            --backend-config="bucket=${BUCKET_TF_STATE}" \
            --backend-config="key=prod/eks/terraform.tfstate" \
            --backend-config="region=us-east-1" \
            --backend-config="dynamodb_table=${DYNAMO_DB_LOCK}"

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -no-color \
            -input=false \
            -lock=true \
            -out=planfile \
            --var-file=terraform.tfvars

      - name: Terraform Apply
        id: apply
        if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && env.TF_DESTROY == 'false' }}
        run: terraform apply -lock=true -auto-approve planfile

      - name: Install kubectl
        if: ${{ env.TF_DESTROY == 'false' }}
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Update kubeconfig
        if: ${{ env.TF_DESTROY == 'false' }}
        run: |
          aws eks update-kubeconfig \
            --name retrogame-eks \
            --region us-east-1

      - name: Fix Karpenter pod identity namespace
        if: ${{ env.TF_DESTROY == 'false' }}
        run: |
          ASSOC_ID=$(aws eks list-pod-identity-associations \
            --cluster-name retrogame-eks \
            --region us-east-1 \
            --query 'associations[?namespace==`kube-system` && serviceAccount==`karpenter`].associationId' \
            --output text)
          if [ ! -z "$ASSOC_ID" ]; then
            aws eks delete-pod-identity-association \
              --cluster-name retrogame-eks \
              --association-id $ASSOC_ID \
              --region us-east-1
            ROLE_ARN=$(aws iam list-roles \
              --query 'Roles[?contains(RoleName, `KarpenterController`)].Arn' \
              --output text | head -1)
            aws eks create-pod-identity-association \
              --cluster-name retrogame-eks \
              --namespace karpenter \
              --service-account karpenter \
              --role-arn $ROLE_ARN \
              --region us-east-1
            kubectl rollout restart deployment -n karpenter || true
          fi

      - name: Patch ArgoCD insecure mode
        if: ${{ env.TF_DESTROY == 'false' }}
        run: |
          kubectl patch configmap argocd-cmd-params-cm \
            -n argocd \
            --type merge \
            -p '{"data":{"server.insecure":"true"}}' || true
          kubectl rollout restart deployment \
            argo-cd-argocd-server -n argocd || true

      - name: Apply Kubernetes manifests
        id: apply_manifests
        if: ${{ env.TF_DESTROY == 'false' }}
        run: |
          kubectl apply -f ../../application.yaml
          kubectl apply -f ../../ingress.yaml

      - name: Verify deployment
        if: ${{ env.TF_DESTROY == 'false' }}
        run: |
          echo "=== Nodes ==="
          kubectl get nodes
          echo "=== Pods ==="
          kubectl get pods -A
          echo "=== Ingress ==="
          kubectl get ingress -A

      - name: Delete manifests before destroy
        id: delete_manifests
        if: ${{ env.TF_DESTROY == 'true' }}
        run: |
          kubectl delete -f ../../ingress.yaml --ignore-not-found
          kubectl delete -f ../../application.yaml --ignore-not-found

      - name: Terraform Destroy
        id: destroy
        if: ${{ env.TF_DESTROY == 'true' }}
        run: |
          terraform destroy \
            --var-file=terraform.tfvars \
            -lock=false \
            -auto-approve