name: IaC Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'envs/prod/**'
      - '.github/workflows/terraform.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'envs/prod/**'

env:
  AWS_ACCOUNT_ID:    ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_ROLE_NAME:     ${{ secrets.AWS_ROLE_NAME }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
  BUCKET_TF_STATE:   ${{ secrets.BUCKET_TF_STATE }}
  DYNAMO_DB_LOCK:    ${{ secrets.DYNAMO_DB_LOCK }}
  TF_DESTROY:        false
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infrastructure:
    name: Deploy EKS Infrastructure
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./envs/prod/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Terraform security scan
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          soft_fail: true
          working_directory: ./envs/prod/

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}
          role-session-name: GitHubActionsSession
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init \
            --backend-config="bucket=${BUCKET_TF_STATE}" \
            --backend-config="key=prod/eks/terraform.tfstate" \
            --backend-config="region=us-east-1" \
            --backend-config="dynamodb_table=${DYNAMO_DB_LOCK}"
        id: init

      - name: Terraform Format Check
        run: terraform fmt -check
        id: fmt

      - name: Terraform Validate
        run: terraform validate
        id: validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -no-color \
            -input=false \
            -lock=true \
            -out=planfile \
            --var-file=terraform.tfvars
        id: plan
       
      - name: Import existing access entries
        if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && env.TF_DESTROY == 'false' }}
        run: |
          terraform import \
            module.eks.aws_eks_access_entry.admin \
            retrogame-eks:arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:user/Tobi || true
          terraform import \
            module.eks.aws_eks_access_entry.pipeline \
            retrogame-eks:arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:user/Tobi || true
        id: import_access_entries  

      - name: Terraform Apply
        if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && env.TF_DESTROY == 'false' }}
        run: terraform apply -lock=true -auto-approve planfile
        id: apply

      - name: Update kubeconfig
        if: ${{ env.TF_DESTROY == 'false' }}
        run: |
          aws eks update-kubeconfig \
            --name retrogame-eks \
            --region us-east-1
        id: update_kubeconfig

      - name: Apply Kubernetes manifests
        if: ${{ env.TF_DESTROY == 'false' }}
        run: |
          kubectl apply -f ../../application.yaml
          kubectl apply -f ../../ingress.yaml
        id: apply_manifests

      - name: Delete Kubernetes manifests before destroy
        if: ${{ env.TF_DESTROY == 'true' }}
        run: |
          kubectl delete -f ../../ingress.yaml --ignore-not-found
          kubectl delete -f ../../application.yaml --ignore-not-found
        id: delete_manifests

      - name: Terraform Destroy
        if: ${{ env.TF_DESTROY == 'true' }}
        run: |
          terraform destroy \
            --var-file=terraform.tfvars \
            -lock=false \
            -auto-approve
        id: destroy