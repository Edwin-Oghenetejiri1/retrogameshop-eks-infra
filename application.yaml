apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: retrogame-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Edwin-Oghenetejiri1/retrogame-k8s-manifests.git
    targetRevision: HEAD
    path: .
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: retrogame
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
