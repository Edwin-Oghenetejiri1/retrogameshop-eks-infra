name: IaC Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'envs/prod/**'
      - '.github/workflows/terraform.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'envs/prod/**'

env:
  AWS_ACCOUNT_ID:     ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_ROLE_NAME:      ${{ secrets.AWS_ROLE_NAME }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
  BUCKET_TF_STATE:    ${{ secrets.BUCKET_TF_STATE }}
  DYNAMO_DB_LOCK:     ${{ secrets.DYNAMO_DB_LOCK }}
  TF_DESTROY:         true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infrastructure:
    name: Deploy EKS Infrastructure
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./envs/prod/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Terraform security scan
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          soft_fail: true
          working_directory: ./envs/prod/

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}
          role-session-name: GitHubActionsSession
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            --backend-config="bucket=${BUCKET_TF_STATE}" \
            --backend-config="key=prod/eks/terraform.tfstate" \
            --backend-config="region=${AWS_DEFAULT_REGION}" \
            --backend-config="dynamodb_table=${DYNAMO_DB_LOCK}"

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -no-color \
            -input=false \
            -lock=true \
            -out=planfile \
            --var-file=terraform.tfvars

      - name: Terraform Apply
        id: apply
        if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && env.TF_DESTROY == 'false' }}
        run: terraform apply -lock=true -auto-approve planfile

      # Verification step (replaces the long list of Helm installs)
      - name: Verify Cluster Connection
        if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
        run: |
          aws eks update-kubeconfig --name retrogame-eks --region ${{ env.AWS_DEFAULT_REGION }}
          kubectl get nodes
          echo "Addons are being managed by Terraform state."
